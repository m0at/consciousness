<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consciousness Simulation</title>
  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js",
        "three/addons/": "./node_modules/three/examples/jsm/",
        "cannon-es": "./node_modules/cannon-es/dist/cannon-es.js",
        "cannon-es/": "./node_modules/cannon-es/"
      }
    }
  </script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #0D1117;
      font-family: monospace;
    }

    #viewport {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #hud-mini {
      position: absolute;
      top: 16px;
      left: 16px;
      min-width: 200px;
      background: rgba(13, 17, 23, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 10px 14px;
      color: #c9d1d9;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
    }

    #hud-detail {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 280px;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 12px 16px;
      color: #c9d1d9;
      font-size: 11px;
      line-height: 1.7;
      display: none;
      pointer-events: none;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }

    #hud-detail.visible {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="viewport"></canvas>
  <div id="hud">
    <div id="hud-mini">Initializing...</div>
    <div id="hud-detail"></div>
  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
